<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SMP NEGERI 10 BANAWA SELATAN | Materi Pembelajaran</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  
  <style>
    /* Styling Konten Dokumen */
    #doc-content { line-height: 1.8; font-size: 1.1rem; color: #333; }
    #doc-content img { 
      max-width: 100%; height: auto; display: block; 
      margin: 20px auto; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      cursor: zoom-in; transition: transform 0.3s ease;
    }
    #doc-content img:hover { transform: scale(1.02); }
    #doc-content table { width: 100% !important; border-collapse: collapse; margin: 15px 0; }
    #doc-content td, #doc-content th { border: 1px solid #dee2e6; padding: 8px; }
    
    /* Logo & Sidebar Styling */
    .brand-logos { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px; background: #fff; border-bottom: 1px solid #dee2e6; }
    .logo-img { height: 55px; width: auto; object-fit: contain; }
    .sidebar-logo-text { font-size: 0.9rem; line-height: 1.3; text-align: center; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

    /* Overlay Loading */
    .loading-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.9); z-index: 50;
      display: none; justify-content: center; align-items: center; flex-direction: column;
    }
    .main-sidebar { min-height: 100vh !important; }
    
    /* Penanda Link Luar */
    #doc-content a::after {
      content: " \f35d";
      font-family: "Font Awesome 5 Free";
      font-weight: 900;
      font-size: 0.75rem;
    }

    /* Modal Zoom Styling */
    #modal-zoom .modal-content { background-color: transparent; border: none; box-shadow: none; }
    #modal-zoom .modal-body { padding: 0; text-align: center; }
    #img-preview { max-width: 100%; max-height: 90vh; border-radius: 5px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    .close-zoom { position: fixed; top: 20px; right: 30px; color: #fff; font-size: 35px; font-weight: bold; cursor: pointer; z-index: 1060; }
  </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
      <li class="nav-item d-none d-sm-inline-block">
        <div class="nav-link d-flex align-items-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/eb/Logo-Tut-Wuri-Handayani-PNG-Warna.png" height="30" alt="Tut Wuri">
            <span class="font-weight-bold text-primary ml-2">SMP NEGERI 10 BANAWA SELATAN</span>
        </div>
      </li>
    </ul>
  </nav>

  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <div class="brand-logos text-center">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Lambang_Kabupaten_Donggala_%282015-sekarang%29.png" class="logo-img" alt="Logo Donggala">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/eb/Logo-Tut-Wuri-Handayani-PNG-Warna.png" class="logo-img" alt="Logo Tut Wuri">
    </div>
    <div class="brand-link text-center py-3">
        <div class="sidebar-logo-text px-2 uppercase">
            SMP NEGERI 10<br>BANAWA SELATAN
        </div>
    </div>

    <div class="sidebar">
      <nav class="mt-3">
        <ul class="nav nav-pills nav-sidebar flex-column" id="dynamic-menu" data-widget="treeview" role="menu">
          <li class="nav-header text-uppercase text-light">Materi Pelajaran</li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper">
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
            <div class="col-sm-12">
                <h1 id="main-title" class="text-dark font-weight-bold">Memuat Materi...</h1>
            </div>
        </div>
      </div>
    </section>

    <section class="content">
      <div class="container-fluid">
        <div class="card card-outline card-primary shadow">
          <div id="loader" class="loading-overlay">
            <i class="fas fa-3x fa-spinner fa-spin text-primary"></i>
            <p class="mt-3 font-weight-bold">Sinkronisasi Data...</p>
          </div>
          <div class="card-body">
            <div id="doc-content"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="modal fade" id="modal-zoom" tabindex="-1" role="dialog" aria-hidden="true">
    <span class="close-zoom" data-dismiss="modal">&times;</span>
    <div class="modal-dialog modal-xl modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-body">
          <img src="" id="img-preview" alt="Preview">
          <p id="img-caption" class="text-white mt-2 font-italic"></p>
        </div>
      </div>
    </div>
  </div>

  <footer class="main-footer text-sm">
    <div class="float-right d-none d-sm-block">Versi 2.0</div>
    <strong>&copy; 2026 <a href="#">SMP NEGERI 10 BANAWA SELATAN</a></strong> - Kab. Donggala
  </footer>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzoY0Y25pfCegNnqDw5LAX5E4kJl9JRdse0E9pdBFhqqwRiFL4FbBAnMJtWYPbAADD_Kg/exec";

  async function fetchMenu() {
    try {
      const response = await fetch(SCRIPT_URL);
      const data = await response.json();
      if(data.error) throw new Error(data.error);

      const menuContainer = $('#dynamic-menu');
      menuContainer.find('.nav-item').remove();

      data.menu.forEach((item, index) => {
        const activeClass = index === 0 ? 'active' : '';
        menuContainer.append(`
          <li class="nav-item">
            <a href="javascript:void(0)" class="nav-link ${activeClass}" onclick="fetchContent('${item.id}', this)">
              <i class="nav-icon fas fa-book-open text-sm"></i>
              <p>${item.name}</p>
            </a>
          </li>
        `);
      });

      if(data.menu.length > 0) fetchContent(data.menu[0].id);
    } catch (err) {
      console.error(err);
      $('#main-title').text("Koneksi Gagal");
      $('#doc-content').html(`<div class="alert alert-danger">Gagal sinkronisasi materi. Periksa izin folder Google Drive Anda.</div>`);
    }
  }

  async function fetchContent(docId, element = null) {
    $('#loader').css('display', 'flex').fadeIn();
    if(element) {
      $('.nav-link').removeClass('active');
      $(element).addClass('active');
    }

    try {
      const response = await fetch(`${SCRIPT_URL}?id=${docId}`);
      const data = await response.json();
      if(data.error) throw new Error(data.error);

      $('#main-title').text(data.title);
      const contentArea = document.getElementById('doc-content');
      contentArea.innerHTML = data.content;

      // Fitur 1: Link Tab Baru
      const links = contentArea.getElementsByTagName('a');
      for (let i = 0; i < links.length; i++) {
        links[i].setAttribute('target', '_blank');
        links[i].setAttribute('rel', 'noopener noreferrer');
      }

      // FITUR 2: Klik Gambar untuk Perbesar (Zoom)
      $('#doc-content img').on('click', function() {
        const src = $(this).attr('src');
        const alt = $(this).attr('alt') || 'Preview Gambar';
        $('#img-preview').attr('src', src);
        $('#img-caption').text(alt);
        $('#modal-zoom').modal('show');
      });
      
      $('html, body').animate({ scrollTop: 0 }, 'fast');
    } catch (err) {
      $('#doc-content').html(`<div class="alert alert-warning">Gagal memuat isi materi.</div>`);
    } finally {
      $('#loader').fadeOut();
    }
  }

  $(document).ready(function() {
    fetchMenu();
  });
</script>
</body>
</html>
