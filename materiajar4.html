<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-Learning | SMPN 10 BANAWA SELATAN</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    
    <style>
        .materi-card { transition: transform .2s; }
        .materi-card:hover { transform: scale(1.02); cursor: pointer; }
        #doc-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 20px 0; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .content-wrapper { background-color: #f4f6f9; }
        .brand-link .brand-image { opacity: .8; }
        #global-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body class="hold-transition layout-top-nav">
<div class="wrapper">

    <div id="global-loader" class="hidden">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <nav class="main-header navbar navbar-expand-md navbar-light navbar-white border-bottom shadow-sm">
        <div class="container">
            <a href="#" class="navbar-brand">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/eb/Logo-Tut-Wuri-Handayani-PNG-Warna.png" alt="Logo" class="brand-image img-circle elevation-3">
                <span class="brand-text font-weight-bold text-uppercase" style="font-size: 1.1rem;">E-Learning SMPN 10</span>
            </a>

            <ul class="order-1 order-md-3 navbar-nav navbar-no-expand ml-auto">
                <li class="nav-item d-none d-sm-inline-block">
                    <div class="nav-link">
                        <span id="display-user" class="badge badge-info p-2">
                            <i class="fas fa-user mr-1"></i> <span id="display-nama"></span> (<span id="display-kelas"></span>)
                        </span>
                    </div>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="#" onclick="logout()" role="button" title="Ganti Akun">
                        <i class="fas fa-power-off"></i>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1 class="m-0" id="page-title">Materi Pembelajaran</h1>
                    </div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="container">
                
                <div id="view-grid">
                    <div class="row mb-4">
                        <div class="col-12">
                            <div class="btn-group w-100 shadow-sm">
                                <button class="btn btn-default filter-btn active" onclick="filterMateri('all', this)">Semua</button>
                                <button class="btn btn-default filter-btn" onclick="filterMateri('pdf', this)">PDF</button>
                                <button class="btn btn-default filter-btn" onclick="filterMateri('doc', this)">Dokumen</button>
                            </div>
                        </div>
                    </div>
                    
                    <div id="menu-grid" class="row">
                        </div>
                </div>

                <div id="view-content" class="d-none">
                    <div class="card card-outline card-primary">
                        <div class="card-header">
                            <h3 class="card-title font-weight-bold" id="main-title">Judul Materi</h3>
                            <div class="card-tools">
                                <button type="button" class="btn btn-tool" onclick="backToGrid()">
                                    <i class="fas fa-times"></i> Tutup
                                </button>
                            </div>
                        </div>
                        <div class="card-body" id="doc-content">
                            </div>
                        <div class="card-footer text-center">
                            <button class="btn btn-secondary" onclick="backToGrid()">Kembali ke Daftar</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="main-footer text-center">
        <strong>&copy; 2026 <a href="#">SMP NEGERI 10 BANAWA SELATAN</a>.</strong> All rights reserved.
    </footer>
</div>

<div class="modal fade" id="modal_identitas" data-backdrop="static" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content border-top border-primary">
            <div class="modal-header">
                <h5 class="modal-title font-weight-bold text-primary">Login Siswa</h5>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="user_nama" class="form-control" placeholder="Masukkan nama...">
                </div>
                <div class="form-group">
                    <label>Kelas</label>
                    <select id="user_kelas" class="form-control">
                        <option value="" disabled selected>Pilih Kelas</option>
                        <option>VII</option>
                        <option>VIII</option>
                        <option>IX</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary btn-block" onclick="simpanIdentitas()">Mulai Belajar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxk5nNqR6kaWcbbNamh7-HlKslHjBkW4mvb6aCEgL9oqlPBZlO7NN1DiMbrPUZGiZ0NNA/exec";
    let allData = [];

    $(document).ready(function() {
        const savedNama = localStorage.getItem('siswa_nama');
        if (!savedNama) {
            $('#modal_identitas').modal('show');
        } else {
            updateUserDisplay();
        }
        fetchMenu();
    });

    function simpanIdentitas() {
        const nama = $('#user_nama').val();
        const kelas = $('#user_kelas').val();
        if (nama && kelas) {
            localStorage.setItem('siswa_nama', nama);
            localStorage.setItem('siswa_kelas', kelas);
            updateUserDisplay();
            $('#modal_identitas').modal('hide');
        } else {
            alert("Harap isi semua kolom!");
        }
    }

    function updateUserDisplay() {
        $('#display-nama').text(localStorage.getItem('siswa_nama'));
        $('#display-kelas').text(localStorage.getItem('siswa_kelas'));
    }

    function logout() {
        if(confirm("Ganti akun siswa?")) {
            localStorage.clear();
            location.reload();
        }
    }

    async function fetchMenu() {
        $('#global-loader').removeClass('d-none');
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            allData = data.menu;
            renderCards(allData);
        } catch (err) {
            $('#menu-grid').html('<div class="col-12"><div class="alert alert-danger">Gagal memuat data materi.</div></div>');
        } finally {
            $('#global-loader').addClass('d-none');
        }
    }

    function renderCards(materiList) {
        const menuGrid = $('#menu-grid');
        menuGrid.empty();

        materiList.forEach((item) => {
            const isPdf = item.type === 'pdf';
            const color = isPdf ? 'danger' : 'primary';
            const icon = isPdf ? 'fa-file-pdf' : 'fa-file-word';

            menuGrid.append(`
                <div class="col-md-4 col-sm-6 mb-4">
                    <div class="card card-outline card-${color} h-100 materi-card shadow-sm" onclick="fetchContent('${item.id}', '${item.name}', '${item.type}')">
                        <div class="card-body text-center">
                            <i class="fas ${icon} fa-3x text-${color} mb-3"></i>
                            <h6 class="font-weight-bold text-dark">${item.name}</h6>
                            <p class="text-muted small">Klik untuk membuka materi</p>
                        </div>
                        <div class="card-footer py-2">
                            <span class="badge badge-${color}">${item.type.toUpperCase()}</span>
                        </div>
                    </div>
                </div>
            `);
        });
    }

    function filterMateri(type, el) {
        $('.filter-btn').removeClass('active');
        $(el).addClass('active');
        const filtered = (type === 'all') ? allData : allData.filter(item => item.type === type);
        renderCards(filtered);
    }

    async function fetchContent(id, judul, tipe) {
        $('#global-loader').removeClass('d-none');
        
        // Log Aktivitas
        const nama = localStorage.getItem('siswa_nama');
        const kelas = localStorage.getItem('siswa_kelas');
        const logUrl = `${SCRIPT_URL}?action=log&nama=${encodeURIComponent(nama)}&kelas=${encodeURIComponent(kelas)}&judul=${encodeURIComponent(judul)}&tipe=${encodeURIComponent(tipe)}`;
        fetch(logUrl, { mode: 'no-cors' });

        try {
            const response = await fetch(`${SCRIPT_URL}?id=${id}`);
            const data = await response.json();
            
            $('#view-grid').addClass('d-none');
            $('#view-content').removeClass('d-none');
            $('#main-title').text(data.title);
            $('#page-title').text('Sedang Membaca Materi');
            
            const contentArea = document.getElementById('doc-content');
            if (data.type === "pdf") {
                contentArea.innerHTML = `<iframe src="${data.content}" style="width:100%; height:750px; border:none;"></iframe>`;
            } else {
                contentArea.innerHTML = data.content;
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (err) {
            alert("Gagal memuat materi.");
        } finally {
            $('#global-loader').addClass('d-none');
        }
    }

    function backToGrid() {
        $('#view-content').addClass('d-none');
        $('#view-grid').removeClass('d-none');
        $('#page-title').text('Materi Pembelajaran');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
